server.port=${PORT:8082}

spring.application.name=student-portal-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/student_portal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

camel.servlet.mapping.context-path=/api/*
camel.springboot.name=studentPortalCamel

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://student-registration-and-course-enrollment-project-4mp2all4x.vercel.app,https://student-registration-and-course-enrollment-project-8rjsm7jms.vercel.app,https://student-registration-and-course-enr.vercel.app,http://localhost:3000,http://127.0.0.1:3000}
